name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Release ${{ github.ref_name }} -- GALAHAD -- ${{ matrix.platform }} -- ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - aarch64-apple-darwin-libgfortran5
          - aarch64-linux-gnu-libgfortran5
          - x86_64-apple-darwin-libgfortran5
          - x86_64-linux-gnu-libgfortran5
          - x86_64-w64-mingw32-libgfortran5
        variant:
          - int32
          - int64

    steps:
      - name: Checkout GALAHAD
        uses: actions/checkout@v4

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.7"
          arch: x64

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-${{ runner.os }}-1.7-binarybuilder

      - name: Set environment variables
        shell: bash
        run: |
          echo "BINARYBUILDER_AUTOMATIC_APPLE=true" >> $GITHUB_ENV
          echo "GALAHAD_RELEASE=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "GALAHAD_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "GALAHAD_URL=https://github.com/${{ github.repository }}.git" >> $GITHUB_ENV

      - name: Install BinaryBuilder
        run: |
          julia --color=no -e 'using Pkg; Pkg.add("BinaryBuilder")'

      - name: Build
        run: |
          julia --color=no .github/julia/build_tarballs_${{ matrix.variant }}.jl \
            ${{ matrix.platform }} --verbose

      - name: Upload BinaryBuilder tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.variant }}
          path: products/*.tar.gz

  package:
    name: Package binaries
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout GALAHAD
        uses: actions/checkout@v4

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.7"
          arch: x64

      - name: Set environment variables
        shell: bash
        run: |
          echo "GALAHAD_RELEASE=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: products
          merge-multiple: true

      - name: Show downloaded tarballs
        run: |
          find products -type f | sort

      - name: Generate final binary archives
        run: |
          julia --color=no .github/julia/generate_binaries.jl

      - name: Show generated archives
        run: |
          ls -lah GALAHAD_binaries.* || true

      - name: Verify generated archives
        run: |
          test -f GALAHAD_binaries.${{ github.ref_name }}.x86_64-linux-gnu-libgfortran5.tar.gz
          test -f GALAHAD_binaries.${{ github.ref_name }}.aarch64-linux-gnu-libgfortran5.tar.gz
          test -f GALAHAD_binaries.${{ github.ref_name }}.x86_64-apple-darwin-libgfortran5.tar.gz
          test -f GALAHAD_binaries.${{ github.ref_name }}.aarch64-apple-darwin-libgfortran5.tar.gz
          test -f GALAHAD_binaries.${{ github.ref_name }}.x86_64-w64-mingw32-libgfortran5.zip

      - name: Create GitHub Release and upload assets
        run: |
          gh release create ${{ github.ref_name }} \
            GALAHAD_binaries.${{ github.ref_name }}.x86_64-linux-gnu-libgfortran5.tar.gz#GALAHAD.${{ github.ref_name }}.linux.x86_64.tar.gz \
            GALAHAD_binaries.${{ github.ref_name }}.aarch64-linux-gnu-libgfortran5.tar.gz#GALAHAD.${{ github.ref_name }}.linux.aarch64.tar.gz \
            GALAHAD_binaries.${{ github.ref_name }}.x86_64-apple-darwin-libgfortran5.tar.gz#GALAHAD.${{ github.ref_name }}.mac.x86_64.tar.gz \
            GALAHAD_binaries.${{ github.ref_name }}.aarch64-apple-darwin-libgfortran5.tar.gz#GALAHAD.${{ github.ref_name }}.mac.aarch64.tar.gz \
            GALAHAD_binaries.${{ github.ref_name }}.x86_64-w64-mingw32-libgfortran5.zip#GALAHAD.${{ github.ref_name }}.windows.x86_64.zip \
            --title "${{ github.ref_name }}" \
            --notes ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
